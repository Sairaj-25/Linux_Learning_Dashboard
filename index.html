<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linux Learning Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-color: #0d1117;
      --container-bg: #161b22;
      --card-bg: #21262d;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-orange: #f0883e;
      --accent-purple: #bc8cff;
      --border-color: #30363d;
      --code-bg: #0d1117;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg-color);
      color: var(--text-primary);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app-shell {
      min-height: 100dvh;
      background:
        radial-gradient(circle at top left, rgba(88, 166, 255, 0.12), transparent 34rem),
        var(--bg-color);
    }

    .topbar {
      background: linear-gradient(135deg, #161b22 0%, #1a2332 100%);
      border-bottom: 3px solid var(--accent-blue);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .mono-title {
      color: var(--accent-blue);
      font-family: "Courier New", Courier, monospace;
    }

    .panel,
    .card,
    .tab-button,
    .search-input {
      background: var(--container-bg);
      border: 1px solid var(--border-color);
    }

    .card {
      background: var(--card-bg);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .card:hover {
      border-color: var(--accent-blue);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.28);
      transform: translateY(-2px);
    }

    .tab-button {
      color: var(--text-secondary);
      transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .tab-button[aria-selected="true"] {
      background: var(--card-bg);
      border-color: var(--active-color, var(--accent-blue));
      color: var(--text-primary);
    }

    .search-input {
      background: var(--code-bg);
      color: var(--text-primary);
    }

    .search-input::placeholder { color: var(--text-secondary); }

    .search-input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.18);
      outline: none;
    }

    .clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.65rem;
    }

    @media (min-width: 640px) {
      .cards-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 900px) {
      .app-shell {
        min-height: 100dvh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      .dashboard-grid {
        min-height: 0;
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr);
      }
      .panel,
      .cards-panel {
        min-height: 0;
      }
      .cards-panel {
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .cards-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        min-height: 0;
        overflow: visible;
        align-content: start;
      }
      .resource-card {
        min-height: 82px;
      }
    }

    @media (max-width: 899px) {
      .dashboard-grid {
        display: grid;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar px-4 py-4 sm:px-6">
      <div class="mx-auto flex max-w-7xl flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
        <div>
          <p class="text-xs font-bold uppercase tracking-[0.18em]" style="color: var(--text-secondary)">Linux workspace</p>
          <h1 class="mono-title text-2xl font-bold leading-tight sm:text-3xl">Learning Resources Dashboard</h1>
        </div>
        <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
          <label class="sr-only" for="topic-search">Search current section</label>
          <input class="search-input h-10 w-full rounded-lg px-4 text-sm sm:w-72" id="topic-search" type="search" placeholder="Search current section">
          <a class="card rounded-lg px-4 py-2 text-center text-sm font-bold" href="Interview-practise/index.html" style="color: var(--accent-blue)">Interview Prep</a>
        </div>
      </div>
    </header>

    <main class="mx-auto w-full max-w-7xl p-4 sm:p-5">
      <div class="dashboard-grid gap-4">
        <aside class="panel rounded-lg p-4">
          <div class="mb-3">
            <p class="text-xs font-bold uppercase tracking-[0.16em]" style="color: var(--accent-orange)">Sections</p>
            <p class="mt-1 text-sm" style="color: var(--text-secondary)">Choose a group, then open any page.</p>
          </div>
          <div class="grid gap-2" id="section-tabs" role="tablist" aria-label="Resource groups"></div>
        </aside>

        <section class="cards-panel panel rounded-lg p-4">
          <div class="mb-3 flex flex-col gap-2 border-b pb-3 sm:flex-row sm:items-end sm:justify-between" style="border-color: var(--border-color)">
            <div>
              <p class="text-xs font-bold uppercase tracking-[0.16em]" id="active-label" style="color: var(--accent-blue)">Resources</p>
              <h2 class="mono-title text-2xl font-bold" id="active-title">Loading</h2>
            </div>
            <p class="text-sm" id="active-count" style="color: var(--text-secondary)">0 pages</p>
          </div>
          <div class="cards-grid" id="resource-grid"></div>
          <div class="hidden rounded-lg p-5 text-sm" id="empty-state" style="background: var(--card-bg); color: var(--text-secondary)">No matching resources found in this section.</div>
        </section>
      </div>
    </main>

    <footer class="border-t px-4 py-2 text-xs sm:px-6" style="border-color: var(--border-color); color: var(--text-secondary)">
      <div class="mx-auto flex max-w-7xl flex-col gap-1 sm:flex-row sm:items-center sm:justify-between">
        <span id="status-line">Loading resources...</span>
        <span>Static HTML routes preserved</span>
      </div>
    </footer>
  </div>

  <script>
    const dataUrl = new URL("dashboard-data.json", window.location.href);
    const tabsRoot = document.querySelector("#section-tabs");
    const gridRoot = document.querySelector("#resource-grid");
    const emptyState = document.querySelector("#empty-state");
    const activeLabel = document.querySelector("#active-label");
    const activeTitle = document.querySelector("#active-title");
    const activeCount = document.querySelector("#active-count");
    const search = document.querySelector("#topic-search");
    const statusLine = document.querySelector("#status-line");
    const accents = [
      { text: "#58a6ff" },
      { text: "#3fb950" },
      { text: "#f0883e" },
      { text: "#bc8cff" }
    ];
    let dashboard = { sections: [] };
    let activeIndex = 0;

    const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[char]));

    const itemMatches = (item, query) => {
      const text = [item.title, item.href, ...(item.tags || [])].join(" ").toLowerCase();
      return text.includes(query);
    };

    const compactTitle = (title) => title
      .replace(" - Comprehensive Linux Notes", "")
      .replace(" - Comprehensive Notes", "")
      .replace(" - Master Notes", "")
      .replace("Linux ", "");

    const renderTabs = () => {
      tabsRoot.innerHTML = dashboard.sections.map((section, index) => {
        const accent = accents[index % accents.length];
        const selected = index === activeIndex;
        return `
          <button class="tab-button rounded-lg px-3 py-3 text-left" type="button" role="tab" aria-selected="${selected}" data-index="${index}" style="--active-color: ${accent.text}">
            <span class="block text-sm font-bold" style="color: ${selected ? accent.text : "inherit"}">${escapeHtml(section.label)}</span>
            <span class="block text-xs">${section.items.length} pages</span>
          </button>
        `;
      }).join("");
    };

    const renderCards = () => {
      const section = dashboard.sections[activeIndex];
      if (!section) return;
      const accent = accents[activeIndex % accents.length];
      const query = search.value.trim().toLowerCase();
      const items = section.items.filter((item) => !query || itemMatches(item, query));

      activeLabel.textContent = section.label;
      activeLabel.style.color = accent.text;
      activeTitle.textContent = section.title;
      activeCount.textContent = `${items.length} of ${section.items.length} pages`;
      emptyState.classList.toggle("hidden", items.length !== 0);
      gridRoot.classList.toggle("hidden", items.length === 0);

      gridRoot.innerHTML = items.map((item) => `
        <a class="resource-card card flex flex-col rounded-lg p-3 focus:outline-none" href="${escapeHtml(item.href)}" aria-label="Open ${escapeHtml(item.title)}">
          <h3 class="clamp-2 text-sm font-semibold leading-5" style="color: var(--text-primary)">${escapeHtml(compactTitle(item.title))}</h3>
          <span class="mt-auto pt-2 text-xs font-bold" style="color: ${accent.text}">Open</span>
        </a>
      `).join("");
    };

    const setActiveSection = (index) => {
      activeIndex = index;
      search.value = "";
      renderTabs();
      renderCards();
    };

    const loadDashboard = async () => {
      try {
        const response = await fetch(dataUrl);
        if (!response.ok) throw new Error("Dashboard data request failed");
        dashboard = await response.json();
        const total = dashboard.sections.reduce((sum, section) => sum + section.items.length, 0);
        statusLine.textContent = `${total} existing pages available from the home dashboard`;
        renderTabs();
        renderCards();
      } catch (error) {
        statusLine.textContent = "Dashboard data failed to load";
        gridRoot.innerHTML = `
          <div class="rounded-lg p-5 text-sm leading-6" style="background: var(--card-bg); color: var(--accent-orange)">
            Dashboard data could not be loaded. Serve this folder over HTTP so the browser can fetch dashboard-data.json.
          </div>
        `;
      }
    };

    tabsRoot.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-index]");
      if (!button) return;
      setActiveSection(Number(button.dataset.index));
    });

    search.addEventListener("input", renderCards);
    loadDashboard();
  </script>
</body>
</html>
